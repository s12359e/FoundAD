# @package app
# Preset for training FoundAD on top of YOUR OWN DINOv3 backbone (SSL-trained).
# Override the three "local backbone" fields below from the command line or here.
meta:
  # Two ways to load YOUR trained DINOv3 backbone as the frozen encoder:
  #   * 'dinov3_local' : build a fixed torch.hub arch (set `arch`) and load your weights. Simple.
  #   * 'dinov3_cfg'   : rebuild the EXACT architecture from your DINOv3 training yaml
  #                      (build_model_from_cfg style) via `config_file`. Use this when your SSL
  #                      model was configured through a DINOv3 yaml so the arch matches precisely.
  model: 'dinov3_local'        # 'dinov3_local' or 'dinov3_cfg'

  # ---- your trained backbone ----
  # REQUIRED: your SSL checkpoint. For the autoresearch_ssl trainer this is e.g.
  #   autoresearch_ssl/runs/last_teacher.pth  (backbone is under the "teacher_backbone" key,
  #   which the loader unwraps automatically).
  weights_path: /path/to/last_teacher.pth
  repo_dir: /path/to/dinov3     # local clone of the dinov3 repo. For 'dinov3_cfg' it is prepended
                                # to sys.path so `import dinov3` resolves. For 'dinov3_local' it is
                                # the torch.hub source (source="local", offline). null = fetch from GitHub.

  # For model='dinov3_local': the torch.hub entrypoint name.
  arch: 'dinov3_vitb16'         # MUST match what you trained: embed_dim 768 -> dinov3_vitb16, embed_dim 384 -> dinov3_vits16

  # For model='dinov3_cfg': path to the DINOv3 training/eval yaml that defines the architecture
  # (student.arch, patch_size, rope, etc.). The teacher backbone is rebuilt from it. Ignored by 'dinov3_local'.
  config_file: null             # e.g. /path/to/dinov3/your_run_config.yaml

  # ---- FoundAD projector / training ----
  crop_size: 512               # match your SSL IMG_SIZE (512); patches = (crop_size / patch_size)^2
  pred_depth: 6
  pred_emb_dim: 384
  use_bfloat16: false
  if_pred_pe: false
  n_layer: 3                   # which intermediate encoder layer to read (from the last)
  feat_normed: false
  loss_mode: 'l2'              # l2 or smooth_l1

model_name: dinov3_local       # used by AD/demo to locate the log folder ${app.meta.model}

logging:
  folder: logs/${data.data_name}/${app.meta.model}${oc.select:diy_name,""}
  write_tag: train
